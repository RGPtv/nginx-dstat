# ─────────────────────────────────────────────────────────────────────────────
# nginx-dstat — required nginx config snippets
#
# 1. Add the stub_status block to your server (internal access only).
# 2. Make sure the access_log uses the "combined" format (default).
# 3. Reload nginx:  sudo nginx -s reload
# ─────────────────────────────────────────────────────────────────────────────


# ── STEP 1: stub_status ───────────────────────────────────────────────────────
# Add this inside your http {} block (usually /etc/nginx/nginx.conf)
# OR inside a separate server block listening on 127.0.0.1 only.

server {
    listen 127.0.0.1:80;          # localhost only — never expose to the internet
    server_name localhost;

    # Allow access ONLY from loopback
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        deny  all;
    }

    # Optionally block all other paths on this internal vhost
    location / {
        return 444;
    }
}


# ── STEP 2: access log format ─────────────────────────────────────────────────
# Inside your http {} block — the "combined" format is nginx's default.
# If you've changed it, make sure it matches the combined pattern:
#
#   $remote_addr - $remote_user [$time_local] "$request"
#   $status $body_bytes_sent "$http_referer" "$http_user_agent"
#
# To explicitly set it in your main server block:

# http {
#     log_format combined '$remote_addr - $remote_user [$time_local] '
#                         '"$request" $status $body_bytes_sent '
#                         '"$http_referer" "$http_user_agent"';
#
#     access_log /var/log/nginx/access.log combined;
# }


# ── STEP 3: verify ────────────────────────────────────────────────────────────
# After reloading nginx, test stub_status:
#
#   curl http://127.0.0.1/nginx_status
#
# Expected output:
#   Active connections: 3
#   server accepts handled requests
#    42 42 91
#   Reading: 0 Writing: 1 Waiting: 2
#
# Test log access:
#   tail -f /var/log/nginx/access.log
